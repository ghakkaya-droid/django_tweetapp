{% extends "base.html" %}

{%block content%}
<h1>AddTweetbyForm Page</h1>
<div class="container-fluid pc-4 mt-4">
    <div style="width: 500px;">
        <form action="" method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Nickname</label>
                {{ form.nickname_input }}
            </div>

            <div class="mb-3">
                <label class="form-label">Message</label>
                {{ form.message_input }}
            </div>

            <button class="btn btn-primary">Submit</button>
        </form>
    </div>
</div>
{%endblock%}
