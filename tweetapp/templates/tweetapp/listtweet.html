{% extends "base.html" %}

{%block content%}

    <div class="container" style="width: 30%; margin-left: 50px;">
        {%for tweet in tweets%}
            <div class="card" style="padding: 10px;">
                <div class="card-header" style="background-color: cornflowerblue;">
                    <h4>User: {{tweet.username}}</h4>
                </div>
                <div class="card-body">
                    <p class="card-text">{{tweet.message}}</p>
                </div>
            {%if tweet.username == user%}
                <a href="{% url 'tweetapp:deletetweet' tweet.id %}" class="btn btn-danger">Delete</a>
            {%endif%}
            </div>
        {%endfor%}
    </div>

{%endblock%}
