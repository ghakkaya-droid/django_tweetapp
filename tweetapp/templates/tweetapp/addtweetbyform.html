{% extends "base.html" %}
{%load static%}


{%block content%}
<h1>AddTweetbyForm Page</h1>
<div class="container tweetform">
    <form action="" method="POST">
        {% csrf_token %}

        {%for field in form%}
        <div class="mb-3">
            <strong>{{field.label_tag}}</strong>
        </div>
        <div class="mb-3">
            {{field}}
        </div>
        {%endfor%}
    <button type="submit" class="btn btn-primary">Send Tweet</button>
    </form>
</div>
{%endblock%}
